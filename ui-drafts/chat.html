<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Product Price Analysis Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#d95a00',
                        'primary-dark': '#b34800',
                        'background-light': '#fdfaf5',
                        'background-dark': '#1e1e1e',
                        'surface-light': '#ffffff',
                        'surface-dark': '#2c2c2c',
                        'text-main-light': '#1a202c',
                        'text-main-dark': '#f7fafc',
                        'text-muted-light': '#4a5568',
                        'text-muted-dark': '#a0aec0',
                        'accent-green': '#10b981',
                        'accent-red': '#ef4444',
                        'accent-yellow': '#f59e0b',
                    },
                    fontFamily: {
                        display: ['Inter', 'sans-serif'],
                    },
                    borderRadius: {
                        DEFAULT: '1rem',
                    },
                    boxShadow: {
                        'soft': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03)',
                    }
                },
            },
        };
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body

    <div

                        You're Here

                    </div>

                    <div class="flex items-center justify-between group">
                        <div class="flex items-center gap-4">
                            <img alt="Luxury bag alternative"
                                class="w-12 h-12 rounded-xl object-cover mix-blend-multiply opacity-90 group-hover:opacity-100 transition-opacity"

                            </button>
                        </div>
                    </div>
                    <hr class="border-gray-100 dark:border-gray-800" />
                    <div class="flex items-center justify-between group">
                        <div class="flex items-center gap-4">
                            <img alt="Luxury bag alternative"
                                class="w-12 h-12 rounded-xl object-cover mix-blend-multiply opacity-90 group-hover:opacity-100 transition-opacity"
                                src="https://lh3.googleusercontent.com/aida-public/AB6AXuCDBbIg3y-S0Bi1JkBZ67GRoY_Ju2RLAzfiuP5dNarbFknr5YwSPSXV45dS8QjBfnaY8LfUXoAOMooWOzdpCU9UjtSYeNH_JCP2AyidHmJ27kwIGHp_BOyDZp5oxw7YB6txYeNOr1R0K_yVoTjsLOA6GYQN9gjBaNqUrm7VfKSW_Ro8wK6FfnkpV4-okgUXrDF8LBdmjDWEuf_nAWS10ucLms9xnIRfgRCWN4DjLMSiU6A9LKIRmOdj0VVOXfcOzAHr0u-jwjpCH4uQ"
                                style="background-color: #93c5fd;" />
                            <div>
                                <h4 class="font-medium text-text-main-light dark:text-text-main-dark text-sm">Luxury Bag
                                </h4>
                                <p class="text-text-muted-light dark:text-text-muted-dark text-xs">eBay</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="text-right">
                                <p class="font-bold text-base text-text-main-light dark:text-text-main-dark">$299</p>
                                <p class="text-accent-green text-xs font-medium">25% less</p>
                            </div>
                            <button
                                class="text-text-muted-light dark:text-text-muted-dark hover:bg-gray-100 dark:hover:bg-gray-800 p-1.5 rounded-lg transition-colors">
                                <span class="material-icons text-[20px]">bookmark_border</span>
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
        <div
            class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-background-light via-background-light to-transparent dark:from-background-dark dark:via-background-dark pt-8 border-t border-gray-100 dark:border-gray-800 backdrop-blur-sm bg-opacity-90 dark:bg-opacity-90">
            <button
